name: mcp_gateway_test

on: workflow_call

jobs:
  mcp_gateway_test:
    runs-on: ubuntu-24.04
    if: github.repository_owner == 'hwdsl2'
    strategy:
      matrix:
        test_id: [no-env, with-env]
      fail-fast: false
    env:
      TEST_ID: ${{ matrix.test_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Test
        run: |
          [ ! -x /usr/bin/docker ] && exit 1

          cd "$GITHUB_WORKSPACE"
          pwd
          ls -ld mcp.env.example

          set -x

          docker build -t mcp-gateway-test .

          if [ "$TEST_ID" = "with-env" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v mcp-gateway-test-data:/var/lib/mcp \
              -v ./mcp.env.example:/mcp.env:ro \
              -p 3000:3000/tcp \
              -d mcp-gateway-test
          elif [ "$TEST_ID" = "no-env" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v mcp-gateway-test-data:/var/lib/mcp \
              -p 3000:3000/tcp \
              -d mcp-gateway-test
          fi

          # Wait for gateway to be ready (up to 120 seconds)
          i=0
          while [ "$i" -lt 120 ]; do
            if docker exec "$TEST_ID" curl -sf http://127.0.0.1:3000/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
            i=$((i + 1))
          done

          docker ps | grep "$TEST_ID"
          docker logs "$TEST_ID"

          # Verify health endpoint (no auth required)
          docker exec "$TEST_ID" curl -sf http://127.0.0.1:3000/health

          # Get API key
          MCP_KEY=$(docker exec "$TEST_ID" mcp_manage --getkey)
          [ -z "$MCP_KEY" ] && exit 1

          # Verify mcp_manage commands
          docker exec "$TEST_ID" mcp_manage --showkey
          docker exec "$TEST_ID" mcp_manage --list
          docker exec "$TEST_ID" mcp_manage --status

          # Verify auth is enforced (request without key should return 401)
          http_code=$(curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/mcp 2>/dev/null || true)
          [ "$http_code" = "401" ] || { echo "Expected 401, got $http_code"; exit 1; }

          # Verify wrong API key is rejected (401)
          http_code=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer wrong-key" \
            http://127.0.0.1:3000/mcp 2>/dev/null || true)
          [ "$http_code" = "401" ] || { echo "Expected 401 for wrong key, got $http_code"; exit 1; }

          # Verify MCP endpoint is accessible with API key (MCP initialize request)
          http_code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $MCP_KEY" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}' \
            http://127.0.0.1:3000/mcp 2>/dev/null || true)
          [ "$http_code" = "200" ] \
            || { echo "Expected 200, got $http_code"; exit 1; }

          # Verify mcp_manage --status reports both services running
          docker exec "$TEST_ID" mcp_manage --status | grep -q "MCPHub:  running" \
            || { echo "MCPHub not running per --status"; exit 1; }
          docker exec "$TEST_ID" mcp_manage --status | grep -q "Caddy:   running" \
            || { echo "Caddy not running per --status"; exit 1; }

          # Verify fetch server endpoint
          docker exec "$TEST_ID" mcp_manage --test fetch

          docker restart "$TEST_ID"

          sleep 10

          # Wait for gateway to come back (up to 120 seconds)
          i=0
          while [ "$i" -lt 120 ]; do
            if docker exec "$TEST_ID" curl -sf http://127.0.0.1:3000/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
            i=$((i + 1))
          done

          docker ps | grep "$TEST_ID"
          docker logs "$TEST_ID"

          # Verify gateway is healthy after restart
          docker exec "$TEST_ID" curl -sf http://127.0.0.1:3000/health

          # Verify API key persisted across restart
          MCP_KEY2=$(docker exec "$TEST_ID" mcp_manage --getkey)
          [ "$MCP_KEY" = "$MCP_KEY2" ] || { echo "API key changed after restart"; exit 1; }

          # Verify MCP endpoint still works after restart
          http_code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $MCP_KEY2" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}' \
            http://127.0.0.1:3000/mcp 2>/dev/null || true)
          [ "$http_code" = "200" ] \
            || { echo "Expected 200 after restart, got $http_code"; exit 1; }

          exit 0
      - name: Clear
        if: always()
        run: |
          docker rm -f "$TEST_ID" || true
          docker volume rm mcp-gateway-test-data || true
          docker rmi mcp-gateway-test || true