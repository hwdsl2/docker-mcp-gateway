name: mcp_gateway_test

on: workflow_call

permissions:
  contents: read

jobs:
  mcp_gateway_test:
    runs-on: ubuntu-24.04
    if: github.repository_owner == 'hwdsl2'
    strategy:
      matrix:
        test_id: [no-env, with-env, with-shared-vol]
      fail-fast: false
    env:
      TEST_ID: ${{ matrix.test_id }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Test
        run: |
          [ ! -x /usr/bin/docker ] && exit 1

          cd "$GITHUB_WORKSPACE"
          pwd
          ls -ld mcp.env.example

          CONFIG_FILE=$(mktemp)
          MCP_SERVERS='filesystem,fetch,github,brave-search,git,postgres,memory,sequential-thinking,unknown' \
          MCP_FILESYSTEM_DIRS='/data/docs,/data/quoted "dir"\path' \
          MCP_GITHUB_TOKEN='ghp_token"with\slash' \
          MCP_BRAVE_API_KEY='brave"key\slash' \
          MCP_GIT_REPO='/repo/quoted "repo"\path' \
          MCP_POSTGRES_URL='postgresql://user:p"w\slash@postgres:5432/db?sslmode=disable' \
            node ./mcp-config.cjs > "$CONFIG_FILE"
          node - "$CONFIG_FILE" <<'NODE'
          const assert = require('assert');
          const fs = require('fs');
          const cfg = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));

          assert.strictEqual(cfg.systemConfig.routing.enableBearerAuth, false);
          assert.deepStrictEqual(cfg.bearerKeys, []);
          assert.deepStrictEqual(Object.keys(cfg.mcpServers), [
            'filesystem',
            'fetch',
            'github',
            'brave-search',
            'git',
            'postgres',
            'memory',
            'sequential-thinking',
          ]);
          assert.deepStrictEqual(cfg.mcpServers.filesystem.args, [
            '@modelcontextprotocol/server-filesystem',
            '/data/docs',
            '/data/quoted "dir"\\path',
          ]);
          assert.strictEqual(cfg.mcpServers.github.env.GITHUB_PERSONAL_ACCESS_TOKEN, 'ghp_token"with\\slash');
          assert.strictEqual(cfg.mcpServers['brave-search'].env.BRAVE_API_KEY, 'brave"key\\slash');
          assert.strictEqual(cfg.mcpServers.git.args[2], '/repo/quoted "repo"\\path');
          assert.strictEqual(
            cfg.mcpServers.postgres.args[1],
            'postgresql://user:p"w\\slash@postgres:5432/db?sslmode=disable',
          );
          NODE

          # Default 'fetch' server when MCP_SERVERS is unset or empty.
          DEFAULT_FILE=$(mktemp)
          MCP_SERVERS='' node ./mcp-config.cjs > "$DEFAULT_FILE" 2>/dev/null
          node - "$DEFAULT_FILE" <<'NODE'
          const assert = require('assert');
          const fs = require('fs');
          const cfg = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          assert.deepStrictEqual(Object.keys(cfg.mcpServers), ['fetch']);
          assert.strictEqual(cfg.mcpServers.fetch.command, 'uvx');
          assert.deepStrictEqual(cfg.mcpServers.fetch.args, ['mcp-server-fetch']);
          assert.strictEqual(cfg.systemConfig.routing.enableBearerAuth, false);
          assert.deepStrictEqual(cfg.bearerKeys, []);
          NODE

          BAD_ERR=$(mktemp)
          if MCP_SERVERS=postgres node ./mcp-config.cjs >/dev/null 2>"$BAD_ERR"; then
            echo "Expected postgres config generation to fail without MCP_POSTGRES_URL"
            exit 1
          fi
          grep -q "MCP_POSTGRES_URL" "$BAD_ERR" || {
            echo "Expected missing MCP_POSTGRES_URL error"
            cat "$BAD_ERR"
            exit 1
          }
          rm -f "$CONFIG_FILE" "$DEFAULT_FILE" "$BAD_ERR"

          set -x

          docker build -t mcp-gateway-test .

          if [ "$TEST_ID" = "with-env" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v mcp-gateway-test-data:/var/lib/mcp \
              -v ./mcp.env.example:/mcp.env:ro \
              -p 3000:3000/tcp \
              -d mcp-gateway-test
          elif [ "$TEST_ID" = "no-env" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v mcp-gateway-test-data:/var/lib/mcp \
              -p 3000:3000/tcp \
              -d mcp-gateway-test
          elif [ "$TEST_ID" = "with-shared-vol" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v mcp-gateway-test-data:/var/lib/mcp \
              -v mcp-gateway-test-shared:/var/lib/mcp-shared \
              -p 3000:3000/tcp \
              -d mcp-gateway-test
          fi

          # Wait for gateway to be ready (up to 120 seconds)
          i=0
          while [ "$i" -lt 120 ]; do
            if docker exec "$TEST_ID" curl -sf http://127.0.0.1:3000/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
            i=$((i + 1))
          done

          docker ps | grep "$TEST_ID"
          docker logs "$TEST_ID"

          # Verify health endpoint (no auth required)
          docker exec "$TEST_ID" curl -sf http://127.0.0.1:3000/health

          # Verify generated config remains valid JSON and leaves MCPHub bearer auth disabled.
          docker exec "$TEST_ID" node -e '
            const fs = require("fs");
            const cfg = JSON.parse(fs.readFileSync("/var/lib/mcp/mcp_settings.json", "utf8"));
            if (cfg.systemConfig?.routing?.enableBearerAuth !== false) {
              throw new Error("MCPHub bearer auth must stay disabled behind Caddy");
            }
            if (!Array.isArray(cfg.bearerKeys) || cfg.bearerKeys.length !== 0) {
              throw new Error("Expected generated bearerKeys to be an empty array");
            }
          '

          # Get API key
          MCP_KEY=$(docker exec "$TEST_ID" mcp_manage --getkey)
          [ -z "$MCP_KEY" ] && exit 1

          # Verify mcp_manage commands
          docker exec "$TEST_ID" mcp_manage --showkey
          docker exec "$TEST_ID" mcp_manage --list
          docker exec "$TEST_ID" mcp_manage --status

          # Verify auth is enforced (request without key should return 401)
          http_code=$(curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/mcp 2>/dev/null || true)
          [ "$http_code" = "401" ] || { echo "Expected 401, got $http_code"; exit 1; }

          # Verify wrong API key is rejected (401)
          http_code=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer wrong-key" \
            http://127.0.0.1:3000/mcp 2>/dev/null || true)
          [ "$http_code" = "401" ] || { echo "Expected 401 for wrong key, got $http_code"; exit 1; }

          # Verify MCP endpoint is accessible with API key (MCP initialize request)
          http_code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $MCP_KEY" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}' \
            http://127.0.0.1:3000/mcp 2>/dev/null || true)
          [ "$http_code" = "200" ] \
            || { echo "Expected 200, got $http_code"; exit 1; }

          # Verify mcp_manage --status reports both services running
          docker exec "$TEST_ID" mcp_manage --status | grep -q "MCPHub:  running" \
            || { echo "MCPHub not running per --status"; exit 1; }
          docker exec "$TEST_ID" mcp_manage --status | grep -q "Caddy:   running" \
            || { echo "Caddy not running per --status"; exit 1; }

          # Verify fetch server endpoint
          docker exec "$TEST_ID" mcp_manage --test fetch

          # Verify memory server endpoint (only enabled when MCP_SERVERS includes 'memory')
          if docker exec "$TEST_ID" mcp_manage --list | grep -q 'memory'; then
            docker exec "$TEST_ID" mcp_manage --test memory
          fi

          docker restart "$TEST_ID"

          sleep 10

          # Wait for gateway to come back (up to 120 seconds)
          i=0
          while [ "$i" -lt 120 ]; do
            if docker exec "$TEST_ID" curl -sf http://127.0.0.1:3000/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
            i=$((i + 1))
          done

          docker ps | grep "$TEST_ID"
          docker logs "$TEST_ID"

          # Verify gateway is healthy after restart
          docker exec "$TEST_ID" curl -sf http://127.0.0.1:3000/health

          # Verify API key persisted across restart
          MCP_KEY2=$(docker exec "$TEST_ID" mcp_manage --getkey)
          [ "$MCP_KEY" = "$MCP_KEY2" ] || { echo "API key changed after restart"; exit 1; }

          # Verify MCP endpoint still works after restart
          http_code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $MCP_KEY2" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}' \
            http://127.0.0.1:3000/mcp 2>/dev/null || true)
          [ "$http_code" = "200" ] \
            || { echo "Expected 200 after restart, got $http_code"; exit 1; }

          # Shared volume test: verify key was copied to shared volume
          if [ "$TEST_ID" = "with-shared-vol" ]; then
            SHARED_KEY=$(docker exec "$TEST_ID" cat /var/lib/mcp-shared/.api_key 2>/dev/null || true)
            [ "$MCP_KEY" = "$SHARED_KEY" ] \
              || { echo "API key not copied to shared volume (expected '$MCP_KEY', got '$SHARED_KEY')"; exit 1; }
          fi

          exit 0
      - name: Clear
        if: always()
        run: |
          docker rm -f "$TEST_ID" || true
          docker volume rm mcp-gateway-test-data || true
          docker volume rm mcp-gateway-test-shared || true
          docker rmi mcp-gateway-test || true
